services:
  - type: web
    name: books-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_CHARSET
        value: utf8mb4
      - key: JWT_SECRET
        sync: false
      - key: JWT_TTL
        value: "3600"
      - key: JWT_ISSUER
        value: books-api
      - key: APP_DEBUG
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOGIN_RATE_LIMIT
        value: "5"
      - key: LOGIN_WINDOW_SECONDS
        value: "60"
